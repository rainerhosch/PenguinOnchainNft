[profile.default]
src = "contracts"
out = "out"
libs = ["node_modules", "lib"]
test = "forge-test"
cache_path = "forge-cache"
solc_version = "0.8.27"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"
ffi = false
fs_permissions = [{ access = "read", path = "./" }]

# Gas reports for mint / hot paths
gas_reports = ["PenguinOnchain", "PengoFactory"]

[fuzz]
runs = 256
max_test_rejects = 65536

[rpc_endpoints]
sepolia = "${ALCHEMY_SEPOLIA_URI}"

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
